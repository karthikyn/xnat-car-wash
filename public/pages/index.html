<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xNAT Car Wash Services - Book Your Service</title>
    <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="/assets/images/logo.svg" alt="xNAT Car Wash Services">
            </div>
            <h1 class="md-headline-medium">xNAT Car Wash</h1>
            <p class="md-body-medium">Welcome, <span id="userName"></span>! <button onclick="logout()" class="md-button-text" style="background:none;border:none;color:white;text-decoration:underline;cursor:pointer;font-size:14px;padding:4px 8px;">Logout</button></p>
        </header>

        <main>
            <form id="bookingForm">
                <div class="form-group">
                    <label for="serviceRegion">Service Center Location</label>
                    <select id="serviceRegion" required>
                        <option value="">Select your location</option>
                        <option value="Chennai">Chennai</option>
                        <option value="Coimbatore">Coimbatore</option>
                        <option value="Madurai">Madurai</option>
                        <option value="Tiruchirappalli">Tiruchirappalli (Trichy)</option>
                        <option value="Salem">Salem</option>
                        <option value="Tirunelveli">Tirunelveli</option>
                        <option value="Tiruppur">Tiruppur</option>
                        <option value="Erode">Erode</option>
                        <option value="Vellore">Vellore</option>
                        <option value="Thoothukudi">Thoothukudi (Tuticorin)</option>
                        <option value="Thanjavur">Thanjavur</option>
                        <option value="Dindigul">Dindigul</option>
                        <option value="Kancheepuram">Kancheepuram</option>
                        <option value="Karur">Karur</option>
                        <option value="Nagercoil">Nagercoil</option>
                        <option value="Kumbakonam">Kumbakonam</option>
                        <option value="Hosur">Hosur</option>
                        <option value="Cuddalore">Cuddalore</option>
                        <option value="Ambur">Ambur</option>
                        <option value="Pollachi">Pollachi</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="carModel">Car Model</label>
                    <input type="text" id="carModel" required>
                </div>

                <div class="form-group">
                    <label for="serviceType">Service Type</label>
                    <select id="serviceType" required>
                        <option value="">Select a service</option>
                        <option value="basic" data-price="₹1200">Basic Wash - ₹1200</option>
                        <option value="premium" data-price="₹2400">Premium Wash - ₹2400</option>
                        <option value="deluxe" data-price="₹4000">Deluxe Detail - ₹4000</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="bookingDate">Date</label>
                    <input type="date" id="bookingDate" required>
                </div>

                <div class="form-group">
                    <label for="bookingTime">Time</label>
                    <select id="bookingTime" required>
                        <option value="">Select time</option>
                        <option value="09:00">9:00 AM</option>
                        <option value="10:00">10:00 AM</option>
                        <option value="11:00">11:00 AM</option>
                        <option value="12:00">12:00 PM</option>
                        <option value="13:00">1:00 PM</option>
                        <option value="14:00">2:00 PM</option>
                        <option value="15:00">3:00 PM</option>
                        <option value="16:00">4:00 PM</option>
                    </select>
                </div>

                <div class="price-display" id="priceDisplay"></div>

                <button type="submit" class="btn-submit">Book Now</button>
            </form>

            <div id="confirmationMessage" class="confirmation hidden">
                <h2 class="md-headline-small">✓ Booking Confirmed!</h2>
                <div id="bookingDetails"></div>
                <button onclick="location.reload()" class="btn-new md-button-filled">New Booking</button>
            </div>

            <section class="bookings-list">
                <h2 class="md-title-large">Your Bookings</h2>
                <div id="bookingsList"></div>
            </section>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>

    <div id="feedbackModal" class="modal hidden">
        <div class="modal-content">
            <h2>Leave Feedback</h2>
            <form id="feedbackForm" onsubmit="submitFeedback(event)">
                <input type="hidden" id="feedbackBookingId">
                <div class="form-group">
                    <label for="rating">Rating</label>
                    <select id="rating" required>
                        <option value="5">5 - Excellent</option>
                        <option value="4">4 - Good</option>
                        <option value="3">3 - Average</option>
                        <option value="2">2 - Poor</option>
                        <option value="1">1 - Very Poor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="feedbackText">Feedback</label>
                    <textarea id="feedbackText" rows="4" style="width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:6px;font-size:16px;font-family:inherit;" required></textarea>
                </div>
                <div style="display:flex;gap:10px;justify-content:flex-end;">
                    <button type="button" onclick="closeFeedbackModal()" class="btn-cancel" style="padding:10px 20px;background:#e0e0e0;color:#333;border:none;border-radius:6px;cursor:pointer;font-weight:600;">Cancel</button>
                    <button type="submit" class="btn-submit">Submit</button>
                </div>
            </form>
        </div>
    </div>
